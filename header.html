<header class="glass">
  <div class="container">
    <div class="header-left">
      <h1>Hopotta's Log</h1>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
        <svg id="theme-toggle-icon" viewBox="0 0 24 24" width="22" height="22">
          <circle class="sun-circle" cx="12" cy="12" r="5" fill="currentColor" style="opacity: 1; transform: scale(1); transform-origin: center;"/>
          
          <g class="sun-rays" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="opacity: 1;">
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </g>
          
          <g class="moon" style="opacity: 0;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="currentColor"/>
          </g>
        </svg>
      </button>
    </div>
    <nav>
      <a href="/">Posts</a>
      <a href="/perspective/">Perspective</a>
      <a href="/paradox/">Paradox</a>
    </nav>
  </div>
</header>

<style>
  :root {
    --glass-bg: rgba(255, 255, 255, 0.75);
    --glass-border: rgba(0, 0, 0, 0.06);
    --glass-highlight: rgba(255, 255, 255, 0.8);
    --nav-hover-bg: rgba(0, 0, 0, 0.05);
    --text-primary: #222;
    --text-secondary: #444;
    --text-hover: #000;
    --icon-color: #444;
    --icon-hover: #000;
  }

  [data-theme="dark"] {
    --glass-bg: rgba(20, 20, 20, 0.70);
    --glass-border: rgba(255, 255, 255, 0.1);
    --glass-highlight: rgba(255, 255, 255, 0.1);
    --nav-hover-bg: rgba(255, 255, 255, 0.1);
    --text-primary: #fff;
    --text-secondary: #ddd;
    --text-hover: #fff;
    --icon-color: #aaa;
    --icon-hover: #fff;
  }

  body {
    margin: 0;
    min-height: 200vh;
  }

  .container {
    width: 100%;
    max-width: 1250px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    box-sizing: border-box;
    height: 100%;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .glass {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 60px;
    z-index: 999;
    background-color: var(--glass-bg);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    box-shadow: 
      inset 0 1px 0 0 var(--glass-highlight),
      0 1px 0 0 var(--glass-border);
      
    transition: background-color 0.3s ease;
  }

  .glass h1 {
    margin: 0;
    color: var(--text-primary);
    font-size: clamp(1rem, 1.5vw, 1.25rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 0 1 auto;
  }

  .theme-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border: none;
    background: transparent;
    color: var(--icon-color);
    cursor: pointer;
    border-radius: 50%;
    transition: all 0.2s ease;
    padding: 0;
  }

  .theme-toggle:hover {
    background-color: var(--nav-hover-bg);
    color: var(--icon-hover);
  }

  .theme-toggle:active {
    transform: scale(0.95);
  }

  .theme-toggle svg {
    overflow: visible;
  }

  .sun-rays {
    transition: opacity 0.3s ease-out;
  }

  .sun-circle {
    transition: all 0.3s ease-in-out;
    transform-origin: center;
  }

  .moon {
    transition: opacity 0.3s ease-out;
  }

  .theme-toggle.animating .sun-rays {
    transition: opacity 0.3s linear;
  }

  .theme-toggle.animating .sun-circle {
    transition: all 0.3s linear;
  }

  .theme-toggle.animating .moon {
    transition: opacity 0.3s linear;
  }

  .theme-toggle.sun-mode .sun-rays {
    opacity: 1;
  }

  .theme-toggle.sun-mode .sun-circle {
    opacity: 1;
    transform: scale(1);
  }

  .theme-toggle.sun-mode .moon {
    opacity: 0;
  }

  .theme-toggle.moon-mode .sun-rays {
    opacity: 0;
  }

  .theme-toggle.moon-mode .sun-circle {
    opacity: 0;
    transform: scale(0);
  }

  .theme-toggle.moon-mode .moon {
    opacity: 1;
  }

  .glass nav {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    height: 100%;
  }

  .glass nav a {
    text-decoration: none;
    color: var(--text-secondary);
    font-size: 0.95rem;
    font-weight: 500;
    padding: 0.5rem 0.8rem;
    border-radius: 8px;
    transition: all 0.2s ease;
  }

  .glass nav a:hover {
    color: var(--text-hover);
    background-color: var(--nav-hover-bg);
  }

  @media (max-width: 900px) {
    .container {
      padding: 0 1.5rem;
    }
  }

  @media (max-width: 700px) {
    .container {
      padding: 0 1rem;
    }
    
    .glass h1 {
      font-size: 1.1rem;
    }
    
    .glass nav {
      flex: 1;
      justify-content: flex-end;
      gap: 0;
    }
    
    .glass nav a {
      font-size: 0.85rem;
      padding: 0.4rem 0.3rem;
    }
    
    .theme-toggle {
      width: 32px;
      height: 32px;
    }
    
    .theme-toggle svg {
      width: 20px;
      height: 20px;
    }
  }

  @media (max-width: 380px) {
    .glass h1 {
      font-size: 0.95rem;
    }
    .glass nav a {
      font-size: 0.75rem;
      padding: 0.3rem 0.1rem;
    }
  }
</style>
